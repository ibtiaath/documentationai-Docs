  /api/v1/translations/translation-requests/{id}/update_status/:
    post:
      operationId: translations_translation_requests_update_status_create
      description: 'Translator/Admin: Update translation request status.


        Translators can update status but CANNOT cancel orders.

        Only admins can cancel orders (must use cancel_with_refund endpoint).


        Status flows based on delivery requirement:


        WITHOUT DELIVERY:

        - under_review -> completed (requires translated document)

        - under_review -> cancelled (ADMIN ONLY via cancel_with_refund)


        WITH DELIVERY:

        - under_review -> in_delivery (requires translated document)

        - in_delivery -> delivered

        - in_delivery -> rejected_by_customer

        - delivered -> completed

        - Any non-terminal -> cancelled (ADMIN ONLY via cancel_with_refund)'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Translation Request.
        required: true
      tags:
      - translations
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
      summary: Translations Translation Requests Update Status Create
  /api/v1/translations/translation-requests/{id}/update_translation_status/:
    post:
      operationId: translations_translation_requests_update_translation_status_create
      description: 'Translator/Admin: Update translation request status with restricted
        permissions.


        Translators can only:

        - Mark as ''completed'' (if no delivery required)

        - Mark as ''in_delivery'' (if delivery required)

        - Mark as ''delivered'' (after in_delivery)


        Admins can use the full update_status endpoint for all transitions.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Translation Request.
        required: true
      tags:
      - translations
      security:
