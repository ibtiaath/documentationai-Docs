components:
  schemas:
    Application:
      type: object
      description: 'Serializer for applications.


        SECURITY: This serializer dynamically excludes sensitive fields for non-admin
        users:

        - admin_notes: Internal notes only visible to admins

        - user_balance: Financial data only visible to the application owner or admins'
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        user_phone:
          type: string
          readOnly: true
          nullable: true
        user_full_name:
          type: string
          readOnly: true
        user_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        program:
          type: integer
          nullable: true
        program_title:
          type: string
          readOnly: true
        program_registration_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        program_university_name:
          type: string
          readOnly: true
        program_university_logo:
          type: string
          readOnly: true
        program_university_city:
          type: string
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        second_name:
          type: string
          maxLength: 100
        third_name:
          type: string
          maxLength: 100
        gender:
          type: string
          maxLength: 20
        nationality:
          type: string
          maxLength: 100
        passport_expiry:
          type: string
          format: date
          nullable: true
        degree:
          type: string
          maxLength: 100
        school_name:
          type: string
          maxLength: 200
        gpa:
          type: string
          maxLength: 20
        graduation_year:
          type: string
          maxLength: 10
        study_language:
          type: string
          maxLength: 100
        language_type:
          type: string
          maxLength: 100
        language_degree:
          type: string
          maxLength: 100
        preferred_start_date:
          type: string
          format: date
          nullable: true
        additional_notes:
          type: string
        full_name:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/Status1d5Enum'
        admin_notes:
          type: string
        rejection_reason:
          type: string
          description: Reason for rejection shown to user
        acceptance_document:
          type: string
          format: uri
          nullable: true
          description: Acceptance letter or document uploaded by admin (legacy - use
            acceptance_document_s3_key for new uploads)
        acceptance_document_url:
          type: string
          readOnly: true
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationDocument'
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        reviewed_by:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - acceptance_document_url
      - created_at
      - documents
      - first_name
      - full_name
      - id
      - program_registration_fee
      - program_title
      - program_university_city
      - program_university_logo
      - program_university_name
      - reviewed_at
      - reviewed_by
      - second_name
      - submitted_at
      - third_name
      - updated_at
      - user
      - user_balance
      - user_email
      - user_full_name
      - user_phone
    ApplicationCreate:
      type: object
      description: Serializer for creating a draft application.
      properties:
        program:
          type: integer
          nullable: true
        first_name:
          type: string
          maxLength: 100
        second_name:
          type: string
          maxLength: 100
        third_name:
          type: string
          maxLength: 100
        gender:
          type: string
          maxLength: 20
        nationality:
          type: string
          maxLength: 100
        passport_expiry:
          type: string
          format: date
          nullable: true
        school_name:
          type: string
          maxLength: 200
        gpa:
          type: string
          maxLength: 20
        graduation_year:
          type: string
          maxLength: 10
        language_type:
          type: string
          maxLength: 100
        language_degree:
          type: string
          maxLength: 100
        preferred_start_date:
          type: string
          format: date
          nullable: true
        additional_notes:
          type: string
      required:
      - first_name
      - second_name
      - third_name
    ApplicationDocument:
      type: object
      description: Serializer for application documents.
      properties:
        id:
          type: integer
          readOnly: true
        document_type:
          type: string
          description: Type of document (e.g., Passport, Transcript, CV)
          maxLength: 100
        file:
          type: string
          format: uri
          nullable: true
          description: Local file storage (legacy)
        s3_key:
          type: string
          readOnly: true
          nullable: true
          description: S3 object key for cloud storage
        file_url:
          type: string
          readOnly: true
        file_name:
          type: string
          readOnly: true
        original_filename:
          type: string
          readOnly: true
        file_size:
          type: integer
          readOnly: true
          description: File size in bytes
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - document_type
      - file_name
      - file_size
      - file_url
      - id
      - original_filename
      - s3_key
    ApplicationSubmit:
      type: object
      description: Serializer for submitting an application.
      properties:
        application_id:
          type: integer
      required:
      - application_id
    AuthProviderEnum:
      enum:
      - email
      - phone
      - google
      - apple
      type: string
      description: '* `email` - Email/Password

        * `phone` - Phone/WhatsApp

        * `google` - Google

        * `apple` - Apple'
    Banner:
      type: object
      description: Serializer for Banner model (admin use).
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          description: Banner title (optional)
          maxLength: 200
        image:
          type: string
          format: uri
          nullable: true
        image_s3_key:
          type: string
          writeOnly: true
        link:
          type: string
          format: uri
          nullable: true
          description: Optional link when banner is clicked (http/https only)
          maxLength: 200
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Display order (0 = first, 1 = second, etc.)
        is_active:
          type: boolean
          description: Whether banner is currently active
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - title
      - updated_at
    BannerPublic:
      type: object
      description: Serializer for public Banner endpoints (only active banners).
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          readOnly: true
          description: Banner title (optional)
        image:
          type: string
          readOnly: true
        link:
          type: string
          format: uri
          readOnly: true
          nullable: true
          description: Optional link when banner is clicked (http/https only)
        order:
          type: integer
          readOnly: true
          description: Display order (0 = first, 1 = second, etc.)
      required:
      - id
      - image
      - link
      - order
      - title
    BlankEnum:
      enum:
      - ''
    College:
      type: object
      description: Serializer for College model.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        university:
          type: integer
        university_name:
          type: string
          readOnly: true
        university_logo:
