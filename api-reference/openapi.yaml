    UserTransaction:
      type: object
      description: Simplified transaction serializer for regular users - only basic
        info.
      properties:
        id:
          type: integer
          readOnly: true
        transaction_id:
          type: string
          readOnly: true
          description: Unique transaction identifier
        transaction_type:
