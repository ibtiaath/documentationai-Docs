    get:
      operationId: study_abroad_transactions_list
      description: 'ViewSet for viewing transaction history.

        Admin-only access to view user transactions.'
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: payment_method
        schema:
          type: string
          enum:
          - bank_transfer
          - credit_card
          - gift_card
          - wallet
        description: '* `wallet` - Wallet Balance

          * `credit_card` - Credit Card

          * `bank_transfer` - Bank Transfer

          * `gift_card` - Gift Card'
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - completed
          - failed
          - pending
          - refunded
        description: '* `pending` - Pending

          * `completed` - Completed

          * `failed` - Failed

          * `refunded` - Refunded'
      - in: query
        name: transaction_type
        schema:
          type: string
          enum:
          - adjustment
          - deposit
          - esim_purchase
          - flight_booking
          - flight_refund
          - refund
          - registration_fee
          - translation_fee
          - withdrawal
        description: '* `registration_fee` - Registration Fee Payment

          * `translation_fee` - Translation Service Fee

          * `refund` - Refund

          * `adjustment` - Balance Adjustment

          * `deposit` - Wallet Deposit

          * `withdrawal` - Wallet Withdrawal

          * `flight_booking` - Flight Booking Payment

          * `flight_refund` - Flight Booking Refund

          * `esim_purchase` - eSIM Purchase'
      tags:
      - study-abroad
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTransactionList'
          description: ''
      summary: Study Abroad Transactions List
