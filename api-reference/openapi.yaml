    NotificationLog:
      type: object
      description: Serializer for notification logs
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          nullable: true
          description: Specific user recipient (for user-specific notifications)
        user_email:
          type: string
          format: email
          readOnly: true
        user_name:
          type: string
          readOnly: true
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        title:
          type: string
          maxLength: 255
        body:
          type: string
        data: {}
        target_audience:
          allOf:
          - $ref: '#/components/schemas/TargetAudienceEnum'
          description: 'Target audience for this notification


            * `guests` - Guests Only

            * `users` - Registered Users Only

            * `all` - All (Guests and Users)'
        status:
          $ref: '#/components/schemas/NotificationLogStatusEnum'
        read:
          type: boolean
          description: Whether the notification has been read by the user
        read_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the notification was marked as read
        firebase_message_id:
          type: string
          description: Firebase message ID for tracking
          maxLength: 255
        error_message:
          type: string
          description: Error message if delivery failed
        sent_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - id
      - notification_type
      - read_at
      - sent_at
      - title
      - user_email
      - user_name
    NotificationLogStatusEnum:
      enum:
      - sent
      - delivered
      - failed
      type: string
      description: '* `sent` - Sent

        * `delivered` - Delivered

        * `failed` - Failed'
    NotificationTypeEnum:
