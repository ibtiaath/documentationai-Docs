    post:
      operationId: flights_bookings_pay_wallet_create
      description: 'Pay for a booking using wallet balance.


        POST /api/v1/flights/bookings/{booking_reference}/pay/wallet/


        This view implements a charge-first payment flow:

        1. Lock booking and user rows, verify balance

        2. Deduct wallet balance FIRST and create pending transaction

        3. Call Duffel API with idempotency key

        4. On success: finalize booking as ''ticketed''

        5. On failure: auto-rollback wallet (refund) and revert to ''pending_payment'''
      parameters:
      - in: path
        name: booking_reference
        schema:
          type: string
        required: true
      tags:
      - flights
      security:
      - jwtAuth: []
