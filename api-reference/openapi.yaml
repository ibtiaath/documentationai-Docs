  /api/v1/admin/gift-codes/:
    get:
      operationId: admin_gift_codes_list
      description: 'Gift Code Management (Admin Only)


        Provides CRUD operations for gift codes with the following features:

        - List all gift codes with filtering and search

        - Create single or batch gift codes

        - Retrieve, update, and delete gift codes

        - View redemption logs

        - Cancel gift codes'
      parameters:
      - in: query
        name: batch_id
        schema:
          type: string
      - in: query
        name: is_redeemed
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - cancelled
          - expired
          - redeemed
        description: '* `active` - Active

          * `redeemed` - Redeemed

          * `expired` - Expired

          * `cancelled` - Cancelled'
      tags:
      - admin
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGiftCodeListList'
          description: ''
      summary: Admin Gift Codes List
    post:
      operationId: admin_gift_codes_create
      description: Create single or batch gift codes.
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GiftCodeCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GiftCodeCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GiftCodeCreate'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GiftCodeCreate'
          description: ''
      summary: Admin Gift Codes Create
