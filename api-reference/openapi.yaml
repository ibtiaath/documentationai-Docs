        batch_id:
          type: string
          description: Batch identifier for bulk-created gift codes
          maxLength: 50
      required:
      - amount
      - created_at
      - created_by_email
      - expires_at
      - id
      - pin
      - redeemed_by_email
      - serial_number
    GiftCodeRedemptionLog:
      type: object
      description: Serializer for redemption logs.
      properties:
        id:
          type: integer
          readOnly: true
        gift_code:
          type: integer
          readOnly: true
        gift_code_serial:
          type: string
          readOnly: true
        gift_code_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/Status74cEnum'
          readOnly: true
        error_message:
          type: string
          readOnly: true
          description: Error message for failed redemption attempts
        balance_before:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: User balance before redemption attempt (for successful redemptions)
        balance_after:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: User balance after redemption (for successful redemptions)
        ip_address:
          type: string
          readOnly: true
          nullable: true
          description: IP address of the redemption attempt
        user_agent:
          type: string
          readOnly: true
          description: User agent string of the redemption attempt
        attempted_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - attempted_at
      - balance_after
      - balance_before
      - error_message
      - gift_code
      - gift_code_amount
      - gift_code_serial
      - id
      - ip_address
      - status
      - user
      - user_agent
      - user_email
    Language:
