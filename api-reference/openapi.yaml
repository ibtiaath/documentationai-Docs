    post:
      operationId: translations_translation_requests_cancel_with_refund_create
      description: 'Admin-only: Cancel translation request and optionally refund money
        to user.


        Accepts optional refund_amount parameter:

        - If provided and > 0: refund that specific amount (must be <= paid amount)

        - If not provided: default to full refund (backwards compat)

        - If 0: cancel without refund


        Refund method depends on how the user originally paid:

        - Wallet payment: refund to wallet balance (instant)

        - Card payment: refund to card via Wayl API (no wallet credit)


        SECURITY: Uses row-level locking to prevent double refund attacks.'
